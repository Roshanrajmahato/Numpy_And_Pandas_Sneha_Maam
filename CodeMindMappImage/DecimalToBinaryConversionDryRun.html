<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decimal to Binary Conversion — Interactive Dry Run</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Arial, sans-serif;
background:#f5f5f5;
padding:30px;
display:flex;
justify-content:center;
}

.wrap{
width:100%;
max-width:950px;
}

.title-main{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
text-align:center;
}

pre{
background:white;
padding:16px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:20px;
}

.card{
background:white;
padding:22px;
border-radius:14px;
border:1px solid #ddd;
}

.row{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:18px;
}

.chip{
padding:8px 14px;
border-radius:8px;
border:2px solid #ccc;
font-weight:bold;
}

.current{
background:#e8e6ff;
border-color:#6c63ff;
}

.done{
background:#dff5e7;
border-color:#1c9e63;
}

.box{
border:1px solid #ccc;
padding:12px;
border-radius:10px;
flex:1;
}

.title{
font-size:12px;
color:gray;
margin-bottom:6px;
}

.decision{
margin-top:14px;
background:#f2f2f2;
padding:10px;
border-left:4px solid #6c63ff;
border-radius:6px;
font-family:monospace;
}

.nav{
margin-top:18px;
display:flex;
gap:10px;
align-items:center;
}

button{
padding:8px 18px;
border-radius:8px;
border:1px solid #999;
cursor:pointer;
}

button:disabled{
opacity:.4;
}

.result{
margin-top:16px;
background:#dff5e7;
padding:12px;
border-radius:8px;
border:1px solid #1c9e63;
font-family:monospace;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title-main">
Decimal to Binary Conversion — Interactive Dry Run
</div>

<pre>
n = int(input())

bi = 0
temp = 1

while n != 0:
    rem = n % 2
    bi = bi + temp * rem
    temp = temp * 10
    n = n // 2

print(bi)
</pre>

<div class="card">

<div class="row">

<div class="box">
<div class="title">Current n</div>
<div id="nBox">—</div>
</div>

<div class="box">
<div class="title">Remainder (rem)</div>
<div id="remBox">—</div>
</div>

<div class="box">
<div class="title">Binary (bi)</div>
<div id="biBox">0</div>
</div>

<div class="box">
<div class="title">Temp</div>
<div id="tempBox">1</div>
</div>

</div>

<div class="decision" id="decisionBox"></div>

<div class="nav">

<button onclick="move(-1)" id="prevBtn">
Prev
</button>

<span id="stepCount"></span>

<button onclick="move(1)" id="nextBtn">
Next
</button>

</div>

<div id="resultBox" class="result" style="display:none"></div>

</div>

</div>

<script>

/* Change this value to test */
let inputNumber = 13;

function buildSteps(){

let steps=[];

let n=inputNumber;
let bi=0;
let temp=1;

steps.push({
n,
rem:null,
bi,
temp,
decision:`Start with n = ${n}`
});

while(n!==0){

let rem=n%2;

bi=bi + temp*rem;

let prevN=n;

temp=temp*10;

n=Math.floor(n/2);

steps.push({
n,
rem,
bi,
temp,
decision:
`${prevN} % 2 = ${rem} → add to binary.
Update temp ×10.
New n = ${prevN}//2`
});

}

steps.push({
n:0,
rem:null,
bi,
temp,
decision:"n becomes 0 → stop loop."
});

return steps;

}

const steps=buildSteps();

let step=0;

function render(){

const s=steps[step];

document.getElementById("nBox").textContent=s.n;

document.getElementById("remBox").textContent=
s.rem!==null?s.rem:"—";

document.getElementById("biBox").textContent=s.bi;

document.getElementById("tempBox").textContent=s.temp;

document.getElementById("decisionBox").textContent=
s.decision;

document.getElementById("stepCount").textContent=
`Step ${step+1} / ${steps.length}`;

document.getElementById("prevBtn").disabled=
step===0;

document.getElementById("nextBtn").disabled=
step===steps.length-1;

if(step===steps.length-1){

document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").innerHTML=
`Binary Value = ${s.bi}`;

}
else{

document.getElementById("resultBox").style.display="none";

}

}

function move(d){

step=Math.max(0,
Math.min(steps.length-1,step+d));

render();

}

render();

</script>

</body>
</html>
