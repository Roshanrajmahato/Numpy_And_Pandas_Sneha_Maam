     <!-- querySelector-->


     <div class="one">
        <h1>Roshysdgfghskhdwklldlllfllg</h1>
        <h1>mnbvcccccxzlkjhgfdspoiuytre</h1>
     </div>
     <div id="two">
        <h1 class="newStyle">sdfghjkl;</h1>
        <h1 class="newStyle">sdfghjkl;</h1>
        <h1 class="newStyle">sdfghjkl;</h1>
        <h1 class="newStyle">sdfghjkl;</h1>
        <h1 class="newStyle">sdfggtrjhghhhhkl;</h1>

     </div>
     <button onclick="firstMatching()">querySelector</button>
     <button onclick="removeStyle()"> Remove Style</button>
     <button onclick="allMatching()">querySelectorAll</button>
     <button onclick="removeAllStyle()">Remove Style</button>
     <script>
        const firstElement=document.querySelector(".one>h1")
        const allElements=document.querySelectorAll("#two h1")

        const firstMatching=function(){
            console.log(firstElement)
            firstElement.classList.add("newStyle")
        }
        const removeStyle=function(){
            firstElement.classList.remove("newStyle")
        }
        const allMatching=function(){
            console.log(allElements)
            for (let i of allElements ){
                i.classList.replace("newStyle","changeStyle")
            }
        }
        const removeAllStyle=function(){
            for(let i of allElements){
                i.classList.toggle("changeStyle")

            }
        }

     </script>
