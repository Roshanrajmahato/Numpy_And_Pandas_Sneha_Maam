    Event Handalar :- Function Handalar
    Type Of Fuction Handalar or Event handalar :-
    1. Mouse events :- onclick,ondbclick 
    2. Keyboard events :- onkeydown,

    4. Focus events :- onfocus,

    <hr />
    <video src="3403453-uhd_2160_4096_25fps.mp4" id="my-video" muted></video>
    <script>
      const videoEle = document.querySelector("#my-video");

      // Playing Video
      videoEle.onmouseenter = playvideo;
      function playvideo() {
        videoEle.play();
      }
      // Pause Video
      videoEle.onmouseleave = pausevideo;
      function pausevideo() {
        videoEle.pause();
        
      }
    </script>
