<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .focus{
            border: 1px lime solid;
            box-shadow: 0px 0px 5px 3px lime;
        }
    </style>
</head>
<body>
    <form action="">
        <input type="text" name="" id="uname" placeholder="username">
        <input type="password" name="" id="upass" placeholder="password">

        <select name="" id="">
            <option hidden>-- Select --</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Login</button>
    </form>
    <script>

        const userNameEle=document.querySelector("#uname")
        const userPassEle=document.querySelector("#upass")
        
        const forrmEle=document.querySelector("form")
        forrmEle.addEventListener("submit",(event)=>{ //addEventListener("submit") // Windows Events 
            window.location.href="./Home.html"
            console.log("Form Submitted")
            event.preventDefault()
        })
        // oninput
        userNameEle.addEventListener("input",(event)=>{
            console.log(event.target.value)
            userNameEle.value=event.target.value.toUpperCase()
        })

        // onchange
        const selecEle=document.querySelector("select")
        selecEle.addEventListener("change",()=>{
            console.log("Selected Role: ",selecEle.value)
        })

        // onfocus
        userNameEle.addEventListener("focus",()=>{
            userNameEle.classList.add("focus")
        })




    </script>
</body>
</html>
