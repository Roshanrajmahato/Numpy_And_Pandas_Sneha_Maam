<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="int-two">
    <script>
        const inpEleTwo =document.querySelector("#int-two")
        inpEleTwo.addEventListener("keyup",event=>{
            inpEleTwo.value=event.target.value.toUpperCase() // event.target.value:-getting the value , .toUpperCase():-convert it into upper case
                            // inpEleTwo.value :- Re-Send it into the input box again With U.C Value

                        })
    </script>
</body>
</html>
