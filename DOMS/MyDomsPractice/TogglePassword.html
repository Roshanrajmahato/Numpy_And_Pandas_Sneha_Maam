<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 🚀 Password Show/Hide Toggle -->
    <input type="password" id="password" />
    <button id="toggle">Show</button>

    <script>
      const passEle = document.getElementById("password");
      const toggEle = document.getElementById("toggle");

      toggle.onclick = () => {
        if (passEle.type === "password") {
          password.type = "text";
          toggEle.textContent = "Hide";
        } else {
          passEle.type = "password";
          toggEle.textContent = "Show";
        }
      };
    </script>
  </body>
</html>
