<!DOCTYPE html>
<html>
<head>
<title>Smart Recipe App</title>

<style>

/* ======= Theme ======= */
body {
    font-family: Arial;
    background: #ffffff;
}

.dark {
    background: #121212;
    color: white;
}

/* ===== Search ===== */
.search-prod {
    width: 500px;
    margin: 10px auto;
    display: flex;
    gap: 10px;
}

.search-prod input {
    width: 100%;
    padding: 10px;
}

/* ===== Grid ===== */
.all-prod {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

.prod {
    width: 280px;
    background: #f1f1f1;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.dark .prod {
    background: #1e1e1e;
}

button {
    margin: 5px;
}

/* ===== Detail ===== */
#detailBox {
    width: 70%;
    margin: auto;
    display: none;
    padding: 10px;
    background: #ddd;
}

.dark #detailBox {
    background: #333;
}

</style>
</head>

<body>

<h2 align="center">Smart Recipe App</h2>

<div align="center">
<button onclick="toggleTheme()">🌙 Dark Mode</button>
<button onclick="showFav()">❤️ Favorites</button>
</div>

<div class="search-prod">
<input id="search" placeholder="Search recipe...">
<button onclick="startVoice()">🎤</button>

<select id="cuisine" onchange="filterCuisine()">
<option>All</option>
</select>
</div>

<div id="detailBox"></div>

<div class="all-prod"></div>

<div align="center">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<hr>

<!-- ===== Add Recipe ===== -->
<h3 align="center">Add Your Recipe</h3>

<div align="center">
<input id="rname" placeholder="Name">
<input id="ring" placeholder="Ingredients comma separated">
<button onclick="addRecipe()">Add</button>
</div>


<script>

let allRecipes = [];
let page = 0;
let fav = JSON.parse(localStorage.getItem("fav") || "[]");

document.addEventListener("DOMContentLoaded", loadData);

function loadData() {
fetch("https://dummyjson.com/recipes")
.then(r => r.json())
.then(data => {

    allRecipes = data.recipes;

    // fill cuisine filter
    let cuisines = [...new Set(allRecipes.map(r => r.cuisine))];
    cuisines.forEach(c =>
        cuisine.innerHTML += `<option>${c}</option>`
    );

    showRecipes();
});
}

/* ===== Pagination ===== */
function showRecipes() {

let box = document.querySelector(".all-prod");
box.innerHTML = "";

let start = page * 6;
let items = allRecipes.slice(start, start + 6);

items.forEach(r => {

box.innerHTML += `
<div class="prod">
<h4>${r.name}</h4>
<img src="${r.image}" width="200">
<p>⭐ ${r.rating}</p>

<button onclick="detail(${r.id})">View</button>

<button onclick="addFav(${r.id})">
${fav.includes(r.id) ? "💔 Remove" : "❤️ Fav"}
</button>

</div>
`;
});
}

function next(){ page++; showRecipes(); }
function prev(){ if(page>0) page--; showRecipes(); }

/* ===== Search ===== */
search.onkeyup = () => {

let v = search.value.toLowerCase();

let f = allRecipes.filter(r =>
r.name.toLowerCase().includes(v)
);

renderCustom(f);
};

function renderCustom(arr){
document.querySelector(".all-prod").innerHTML =
arr.map(r => `
<div class="prod">
${r.name}
</div>`).join("");
}

/* ===== Cuisine ===== */
function filterCuisine(){
let c = cuisine.value;

if(c=="All") return showRecipes();

let f = allRecipes.filter(r => r.cuisine==c);
renderCustom(f);
}

/* ===== Detail ===== */
function detail(id){

let r = allRecipes.find(x=>x.id==id);

detailBox.style.display="block";

detailBox.innerHTML = `
<h3>${r.name}</h3>
<p>${r.ingredients.join(", ")}</p>
<p>${r.instructions.join(". ")}</p>
<button onclick="detailBox.style.display='none'">Close</button>
`;
}

/* ===== Favorites ===== */
function addFav(id){

if(fav.includes(id))
fav = fav.filter(x=>x!=id);
else
fav.push(id);

localStorage.setItem("fav", JSON.stringify(fav));

showRecipes();
}

function showFav(){
let f = allRecipes.filter(r=>fav.includes(r.id));
renderCustom(f);
}

/* ===== Dark Mode ===== */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* ===== Voice Search ===== */
function startVoice(){

let sp = new webkitSpeechRecognition();

sp.onresult = e => {
search.value = e.results[0][0].transcript;
search.onkeyup();
};

sp.start();
}

/* ===== Add Own Recipe ===== */
function addRecipe(){

allRecipes.unshift({
id: Date.now(),
name: rname.value,
image: "https://via.placeholder.com/200",
rating: 5,
ingredients: ring.value.split(","),
instructions:["User added recipe"]
});

showRecipes();
}

</script>

</body>
</html>
