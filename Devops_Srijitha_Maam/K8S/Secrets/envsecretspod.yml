apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
spec:
  containers:
  - name: myapp
    image: busybox
    command: [ "/bin/sh", "-c", "env; sleep 3600" ]
    env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: username

    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: password